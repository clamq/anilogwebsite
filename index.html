<!doctype html>
<html>
  <head>
    <title>Zach's AniShowLog | My Favorite Shows! </title>
    <meta name="description" content="A Catalog of Shows Set in Los Angeles" />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <script type="text/javascript" src="scripts.js"></script>
  </head>

  <body>
    <header class="main-header">
      <h1 class="title">Zach's Show Log</h1>
    </header>
 <div class="filter-bar">
  <label for="score-filter">Sort by Score:</label>
  <select id="score-filter" onchange="sortByScore()">
    <option value="desc">Highest First</option>
    <option value="asc">Lowest First</option>
  </select>
   <label for="status-filter">Filter by Status:</label>
  <select id="status-filter" onchange="filterByStatus()">
    <option value="all">All</option>
    <option value="Watching">Watching</option>
    <option value="Completed">Completed</option>
    <option value="Plan to Watch">Plan to Watch</option>
    <option value="Dropped">Dropped</option>
  </select>
</div>
    <h2 class="catalog-title">My Favorite Animes</h2>
    <div id="card-container"></div>
  <h2 class="catalog-title">Recently Watched Movies</h2>
<div id="recent-card-container"></div>
    <div class="card" style="display: none">
      <div class="card-content">
        <h2>TV Show Title</h2>
        <img src="" alt="TV Show Poster" />
        <ul>
          <li>Bullet Point 1</li>
          <li>Bullet Point 2</li>
        </ul>
      </div>
    </div>
    <div class="footer">
    </div>
  </body>
</html>
